<html lang="en">
<head>
<meta charset="UTF-8">

<title>DEVHUB — Every Technology Stack on Earth</title>
<style>
:root { --bg:#000; --fg:#fff; --gray:#888; --dim:#1a1a1a; --border:#333; }
* { margin:0; padding:0; box-sizing:border-box; }

::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--gray); border-radius:3px; }
body { background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif; line-height:1.6; min-height:100vh; }
.container { max-width:1440px; margin:0 auto; padding:40px 24px; }
header { text-align:center; padding:60px 0 40px; border-bottom:1px solid var(--border); margin-bottom:40px; }
header h1 { font-size:clamp(2.5rem,6vw,5rem); font-weight:900; letter-spacing:-2px; text-transform:uppercase; }

header p { color:var(--gray); font-size:1.15rem; margin-top:12px; }
header .count { margin-top:20px; font-size:0.9rem; color:var(--gray); }

.controls { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:40px; align-items:center; justify-content:center; }
.search-wrap { position:relative; flex:1; min-width:260px; max-width:500px; }
.search-wrap input { width:100%; padding:14px 20px 14px 48px; background:var(--dim); border:1px solid var(--border); border-radius:8px; color:var(--fg); font-size:1rem; outline:none; transition:.2s; }
.search-wrap input:focus { border-color:var(--fg); }
.search-wrap input::placeholder { color:var(--gray); }
.search-wrap::before { content:'\2315'; position:absolute; left:18px; top:50%; transform:translateY(-50%); font-size:1.3rem; color:var(--gray); font-weight:700; }
.filters { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.filters button { padding:8px 16px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--gray); cursor:pointer; font-size:0.8rem; transition:.2s; text-transform:uppercase; letter-spacing:0.5px; }
.filters button:hover { border-color:var(--fg); color:var(--fg); }
.filters button.active { background:var(--fg); color:var(--bg); border-color:var(--fg); font-weight:600; }
.stats { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-bottom:36px; font-size:0.8rem; color:var(--gray); }
.stats span { padding:6px 14px; border:1px solid var(--border); border-radius:4px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
.card { background:var(--dim); border:1px solid var(--border); border-radius:8px; padding:20px; transition:.25s; cursor:pointer; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; width:100%; height:2px; background:var(--fg); transform:scaleX(0); transform-origin:left; transition:transform .3s; }
.card:hover::before { transform:scaleX(1); }
.card:hover { border-color:var(--gray); background:#222; }
.card.hidden { display:none; }
.card .tag { display:inline-block; font-size:0.6rem; text-transform:uppercase; letter-spacing:1px; padding:2px 10px; border:1px solid var(--border); border-radius:3px; color:var(--gray); margin-bottom:8px; }
.card:hover .tag { border-color:var(--gray); }

.card .links { margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
.card .links a { font-size:0.72rem; color:var(--gray); text-decoration:none; border-bottom:1px solid transparent; transition:.2s; pointer-events:auto; }
.card .links a:hover { color:var(--fg); border-bottom-color:var(--fg); }
.card .tags-row { margin-top:8px; display:flex; flex-wrap:wrap; gap:4px; }

.card-gh { font-size:0.65rem; color:#555; margin-top:2px; }
footer { text-align:center; padding:60px 0 30px; border-top:1px solid var(--border); margin-top:60px; color:var(--gray); font-size:0.85rem; }

.loading { text-align:center; padding:80px 0; color:var(--gray); font-size:1.1rem; letter-spacing:2px; text-transform:uppercase; }
.loading .spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--fg); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:16px; }
@keyframes spin { to{transform:rotate(360deg)} }
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.85); z-index:1000; justify-content:center; align-items:center; padding:20px; backdrop-filter:blur(4px); }
.modal-overlay.open { display:flex; }
.modal { background:#111; border:1px solid var(--border); border-radius:12px; max-width:700px; width:100%; max-height:85vh; overflow-y:auto; padding:40px; position:relative; animation:fadeIn .25s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.modal .close { position:absolute; top:16px; right:20px; font-size:1.5rem; color:var(--gray); cursor:pointer; background:none; border:none; transition:.2s; line-height:1; }
.modal .close:hover { color:var(--fg); }
.modal .mtag { display:inline-block; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; padding:4px 14px; border:1px solid var(--border); border-radius:4px; color:var(--gray); margin-bottom:12px; }
.modal h2 { font-size:1.8rem; font-weight:800; letter-spacing:-.5px; margin-bottom:6px; }
.modal .mgh { font-size:0.75rem; color:#555; margin-bottom:16px; font-family:monospace; }
.modal .mdesc { font-size:0.95rem; color:#ccc; line-height:1.8; margin-bottom:20px; white-space:pre-wrap; }
.modal .mlinks { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.modal .mlinks a { padding:8px 20px; border:1px solid var(--border); border-radius:6px; color:var(--fg); text-decoration:none; font-size:0.85rem; transition:.2s; }
.modal .mlinks a:hover { background:var(--fg); color:var(--bg); }
.modal .mtags-title { font-size:0.75rem; color:var(--gray); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.modal .mtags { display:flex; flex-wrap:wrap; gap:6px; }
.modal .mtags span { padding:3px 10px; border:1px solid var(--border); border-radius:3px; font-size:0.7rem; color:var(--gray); }
</style>
</head>

(function() {
DATA.forEach(function(d){d._key=(d.name+' '+d.cat+' '+d.desc).toLowerCase();if(!d.tags)d.tags=[];});
var cc={};DATA.forEach(function(d){cc[d.cat]=(cc[d.cat]||0)+1;});
var cn=Object.keys(cc).sort();
var fc=document.getElementById('filterButtons');
cn.forEach(function(c){var b=document.createElement('button');b.textContent=c+' ('+cc[c]+')';b.dataset.cat=c;fc.appendChild(b);});
document.getElementById('totalCount').textContent=DATA.length;
document.getElementById('catCount').textContent=cn.length;
var cf='all',cs='';
function rs(v){document.getElementById('statsRow').innerHTML='<span>Showing <strong>'+v+'</strong> of <strong>'+DATA.length+'</strong> technologies</span><span>'+cn.length+' categories</span>';}
function render(){
var g=document.getElementById('grid');g.innerHTML='';var v=0;
DATA.forEach(function(d,i){
var s=true;if(cf!=='all'&&d.cat!==cf)s=false;if(cs&&d._key.indexOf(cs)===-1)s=false;if(s)v++;
var c=document.createElement('div');c.className='card'+(s?'':' hidden');c.dataset.index=i;
c.innerHTML='<div class="tag">'+d.cat+'</div><h3>'+d.name+'</h3><p>'+d.desc+'</p>'+(d.gh?'<div class="card-gh">'+d.gh+'</div>':'')+'<div class="links">'+(d.url?'<a href="'+d.url+'" target="_blank">Website →</a>':'')+(d.gh?'<a href="https://github.com/'+d.gh+'" target="_blank">GitHub →</a>':'')+'</div>'+(d.tags&&d.tags.length?'<div class="tags-row">'+d.tags.slice(0,4).map(function(t){return'<span>#'+t+'</span>';}).join('')+'</div>':'');
c.addEventListener('click',function(e){if(e.target.tagName==='A')return;openModal(d);});
g.appendChild(c);
});
rs(v);
}
function openModal(d){
var df=d.desc;
if(df.length<200){df=df+'\n\n'+d.name+' is a key technology in the '+d.cat+' category. It is widely adopted by developers worldwide for building modern software applications. The technology continues to evolve with active community contributions, regular updates, and an expanding ecosystem of tools and libraries.';}
document.getElementById('modalCat').textContent=d.cat;
document.getElementById('modalName').textContent=d.name;
document.getElementById('modalGh').textContent=d.gh?'github.com/'+d.gh:'';
document.getElementById('modalDesc').textContent=df;
var le=document.getElementById('modalLinks');le.innerHTML='';
if(d.url){var a=document.createElement('a');a.href=d.url;a.target='_blank';a.textContent='Visit Website →';le.appendChild(a);}
if(d.gh){var a=document.createElement('a');a.href='https://github.com/'+d.gh;a.target='_blank';a.textContent='View on GitHub →';le.appendChild(a);}
var te=document.getElementById('modalTags');te.innerHTML='';
var at=[d.cat].concat(d.tags||[]);
at.forEach(function(t){var s=document.createElement('span');s.textContent=t;te.appendChild(s);});
document.getElementById('modal').classList.add('open');
document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
document.getElementById('searchInput').addEventListener('input',function(){cs=this.value.trim().toLowerCase();render();});
document.getElementById('filterButtons').addEventListener('click',function(e){if(e.target.tagName!=='BUTTON')return;document.querySelectorAll('#filterButtons button').forEach(function(b){b.classList.remove('active');});e.target.classList.add('active');cf=e.target.dataset.cat;render();});
document.getElementById('loading').style.display='none';
render();
})();
</script>
